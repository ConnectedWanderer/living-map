name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ingestion-worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  test-les:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/location-extraction-service
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen
      - run: uv run python -m pytest -m "not model_dependent"

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: [test-ingestion, test-api, test-les, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install & configure scw
        uses: scaleway/action-scw@v1
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          export-config: true
      - name: Login to Container Registry
        run: scw registry login
      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "ingestion=true" >> $GITHUB_OUTPUT
            echo "les=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "api=$([[ "$CHANGED" =~ "backend/api/" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "ingestion=$([[ "$CHANGED" =~ "backend/ingestion-worker/" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "les=$([[ "$CHANGED" =~ "backend/location-extraction-service/" ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi
      - name: Build & push tile-api
        if: steps.changes.outputs.api == 'true'
        run: |
          docker build -t rg.fr-par.scw.cloud/living-map/tile-api:${{ github.sha }} -t rg.fr-par.scw.cloud/living-map/tile-api:latest backend/api
          docker push --all-tags rg.fr-par.scw.cloud/living-map/tile-api
      - name: Retag tile-api (no build)
        if: steps.changes.outputs.api == 'false'
        run: |
          docker pull rg.fr-par.scw.cloud/living-map/tile-api:latest
          docker tag rg.fr-par.scw.cloud/living-map/tile-api:latest rg.fr-par.scw.cloud/living-map/tile-api:${{ github.sha }}
          docker push rg.fr-par.scw.cloud/living-map/tile-api:${{ github.sha }}
      - name: Prune old tags for tile-api
        run: |
          IMAGE_ID=$(scw registry image list name=tile-api -o json | jq -r '.[0].id')
          if [ -n "$IMAGE_ID" ] && [ "$IMAGE_ID" != "null" ]; then
            scw registry tag list image-id="$IMAGE_ID" order-by=created_at_desc -o json | \
              jq -r '.[].id' | tail -n +11 | xargs -r -I{} scw registry tag delete {} region=fr-par
          fi
      - name: Build & push ingestion-job
        if: steps.changes.outputs.ingestion == 'true'
        run: |
          docker build -t rg.fr-par.scw.cloud/living-map/ingestion-job:${{ github.sha }} -t rg.fr-par.scw.cloud/living-map/ingestion-job:latest backend/ingestion-worker
          docker push --all-tags rg.fr-par.scw.cloud/living-map/ingestion-job
      - name: Retag ingestion-job (no build)
        if: steps.changes.outputs.ingestion == 'false'
        run: |
          docker pull rg.fr-par.scw.cloud/living-map/ingestion-job:latest
          docker tag rg.fr-par.scw.cloud/living-map/ingestion-job:latest rg.fr-par.scw.cloud/living-map/ingestion-job:${{ github.sha }}
          docker push rg.fr-par.scw.cloud/living-map/ingestion-job:${{ github.sha }}
      - name: Prune old tags for ingestion-job
        run: |
          IMAGE_ID=$(scw registry image list name=ingestion-job -o json | jq -r '.[0].id')
          if [ -n "$IMAGE_ID" ] && [ "$IMAGE_ID" != "null" ]; then
            scw registry tag list image-id="$IMAGE_ID" order-by=created_at_desc -o json | \
              jq -r '.[].id' | tail -n +11 | xargs -r -I{} scw registry tag delete {} region=fr-par
          fi
      - name: Build & push les-job
        if: steps.changes.outputs.les == 'true'
        run: |
          docker build -t rg.fr-par.scw.cloud/living-map/les-job:${{ github.sha }} -t rg.fr-par.scw.cloud/living-map/les-job:latest backend/location-extraction-service
          docker push --all-tags rg.fr-par.scw.cloud/living-map/les-job
      - name: Retag les-job (no build)
        if: steps.changes.outputs.les == 'false'
        run: |
          docker pull rg.fr-par.scw.cloud/living-map/les-job:latest
          docker tag rg.fr-par.scw.cloud/living-map/les-job:latest rg.fr-par.scw.cloud/living-map/les-job:${{ github.sha }}
          docker push rg.fr-par.scw.cloud/living-map/les-job:${{ github.sha }}
      - name: Prune old tags for les-job
        run: |
          IMAGE_ID=$(scw registry image list name=les-job -o json | jq -r '.[0].id')
          if [ -n "$IMAGE_ID" ] && [ "$IMAGE_ID" != "null" ]; then
            scw registry tag list image-id="$IMAGE_ID" order-by=created_at_desc -o json | \
              jq -r '.[].id' | tail -n +11 | xargs -r -I{} scw registry tag delete {} region=fr-par
          fi

  # IMPORTANT: SUPABASE_POOLER_URL and SUPABASE_DATABASE_URL secrets must
  # include ?options=-c%20search_path=living_map,public so that the dedicated
  # living_map schema is found by unqualified queries.
  deploy-tile-api:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - name: Install & configure scw
        uses: scaleway/action-scw@v1
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          export-config: true
      - id: deploy
        run: |
          CREATE_ERR=$(mktemp)
          trap 'rm -f "$CREATE_ERR"' EXIT
          if scw container container create \
            namespace-id=${{ secrets.SCW_NAMESPACE_ID }} \
            name=tile-api \
            image=rg.fr-par.scw.cloud/living-map/tile-api:${{ github.sha }} \
            min-scale=0 max-scale=1 \
            memory-limit-bytes=1G \
            privacy=public \
            secret-environment-variables.DATABASE_URL=${{ secrets.SUPABASE_POOLER_URL }} \
            secret-environment-variables.CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} 2>"$CREATE_ERR"; then
            echo "Created tile-api container"
          elif grep -q "already exists" "$CREATE_ERR"; then
            echo "Container already exists, updating..."
            scw container container update ${{ secrets.SCW_NAMESPACE_ID }}/tile-api \
              image=rg.fr-par.scw.cloud/living-map/tile-api:${{ github.sha }} \
              secret-environment-variables.DATABASE_URL=${{ secrets.SUPABASE_POOLER_URL }} \
              secret-environment-variables.CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          else
            echo "Failed to create container:"
            cat "$CREATE_ERR"
            exit 1
          fi
          rm -f "$CREATE_ERR"
          echo "url=$(scw container container get ${{ secrets.SCW_NAMESPACE_ID }}/tile-api -o json | jq -r '.status.url')" >> $GITHUB_OUTPUT

  deploy-ingestion-job:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    outputs:
      job-id: ${{ steps.create-ingestion-job.outputs.id }}
    steps:
      - uses: actions/checkout@v6
      - name: Install & configure scw
        uses: scaleway/action-scw@v1
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          export-config: true
      - name: Create or update ingestion-job
        id: create-ingestion-job
        run: |
          JOB_OUT=$(mktemp)
          trap 'rm -f "$JOB_OUT"' EXIT
          EXISTING_ID=$(scw jobs definition list -o json | jq -r \
            --arg NAME "ingestion-job" \
            '.[] | select(.name == $NAME) | .id')
          if [ -z "$EXISTING_ID" ] || [ "$EXISTING_ID" = "null" ]; then
            scw jobs definition create -o json \
              name=ingestion-job \
              image-uri=rg.fr-par.scw.cloud/living-map/ingestion-job:${{ github.sha }} \
              cpu-limit=280 \
              memory-limit=512 \
              environment-variables.DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }} \
              cron-schedule.schedule="0 6 * * *" \
              cron-schedule.timezone=UTC > "$JOB_OUT"
          else
            scw jobs definition update "$EXISTING_ID" -o json \
              image-uri=rg.fr-par.scw.cloud/living-map/ingestion-job:${{ github.sha }} \
              environment-variables.DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }} > "$JOB_OUT"
          fi
          JOB_ID=$(jq -r '.id' "$JOB_OUT")
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Failed to extract job definition ID:"
            cat "$JOB_OUT"
            exit 1
          fi
          echo "id=$JOB_ID" >> $GITHUB_OUTPUT

  deploy-les-job:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    outputs:
      job-id: ${{ steps.create-les-job.outputs.id }}
    steps:
      - uses: actions/checkout@v6
      - name: Install & configure scw
        uses: scaleway/action-scw@v1
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          export-config: true
      - name: Create or update les-job
        id: create-les-job
        run: |
          JOB_OUT=$(mktemp)
          trap 'rm -f "$JOB_OUT"' EXIT
          EXISTING_ID=$(scw jobs definition list -o json | jq -r \
            --arg NAME "les-job" \
            '.[] | select(.name == $NAME) | .id')
          if [ -z "$EXISTING_ID" ] || [ "$EXISTING_ID" = "null" ]; then
            scw jobs definition create -o json \
              name=les-job \
              image-uri=rg.fr-par.scw.cloud/living-map/les-job:${{ github.sha }} \
              cpu-limit=1120 \
              memory-limit=2048 \
              environment-variables.DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }} \
              cron-schedule.schedule="0 7 * * *" \
              cron-schedule.timezone=UTC > "$JOB_OUT"
          else
            scw jobs definition update "$EXISTING_ID" -o json \
              image-uri=rg.fr-par.scw.cloud/living-map/les-job:${{ github.sha }} \
              environment-variables.DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }} > "$JOB_OUT"
          fi
          JOB_ID=$(jq -r '.id' "$JOB_OUT")
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Failed to extract job definition ID:"
            cat "$JOB_OUT"
            exit 1
          fi
          echo "id=$JOB_ID" >> $GITHUB_OUTPUT

  deploy-frontend:
    needs: [deploy-tile-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-tile-api.outputs.url || secrets.VITE_API_URL }}
      - uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist

