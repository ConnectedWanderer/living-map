include:
  - path: ./location-extraction-service/docker-compose.yml

services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: livingmap
      POSTGRES_PASSWORD: livingmap
      POSTGRES_DB: livingmap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livingmap -d livingmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: node:22-alpine
    environment:
      DATABASE_URL: postgres://livingmap:livingmap@postgres:5432/livingmap
    volumes:
      - ./migrations:/migrations
    command:
      - sh
      - -c
      - "npx --yes node-pg-migrate@8.0.4 up --migration-file-language js --migration-dir /migrations"
    depends_on:
      postgres:
        condition: service_healthy

  ingestion-worker:
    build: ./ingestion-worker
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://livingmap:livingmap@postgres:5432/livingmap
      LOCATION_EXTRACTION_URL: http://location-extraction:8000
      PORT: "3000"
      LOG_LEVEL: info
    depends_on:
      migrate:
        condition: service_completed_successfully
