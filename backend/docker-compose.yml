services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      # WARNING: These credentials are for local development only.
      # Override with secure values in production deployments.
      POSTGRES_USER: livingmap
      POSTGRES_PASSWORD: livingmap
      POSTGRES_DB: livingmap
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livingmap -d livingmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: node:22-alpine
    environment:
      DATABASE_URL: postgres://livingmap:livingmap@postgres:5432/livingmap?options=-c%20search_path=living_map,public
    volumes:
      - ./migrations:/migrations
    command:
      - sh
      - -c
      - "npx --yes node-pg-migrate@8.0.4 up --migration-file-language js --migration-dir /migrations --schema living_map"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://livingmap:livingmap@postgres:5432/livingmap?options=-c%20search_path=living_map,public
      # WARNING: Wildcard CORS for local dev only. Set a specific origin in production.
      CORS_ORIGIN: "*"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build: ../frontend
    ports:
      - "8080:80"
    depends_on:
      - api
